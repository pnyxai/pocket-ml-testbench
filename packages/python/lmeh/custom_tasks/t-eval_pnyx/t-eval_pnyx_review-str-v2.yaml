include: _t-eval_pnyx.yaml
task: t-eval_pnyx_review-str-v2
dataset_name: review_str_v2
process_results: !function utils.t_eval_review_match
metric_list:
  - metric: a-vert_correct_score
    aggregation: mean
    higher_is_better: None
  - metric: a-vert_wrong_score
    aggregation: mean
    higher_is_better: None
  - metric: a-vert_match
    aggregation: mean
    higher_is_better: true
filter_list:
  - name: pass_all
    filter:
      - function: take_first
metadata:
  version: 1.0
